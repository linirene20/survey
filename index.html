<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問卷調查</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 12px; }
    p  { font-size: 15px; color: #718096; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #4A90D9;
      color: white;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #357ABD; }
    .note { font-size: 12px; color: #a0aec0; margin-top: 20px; }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="icon">📋</div>
  <h1>問卷調查</h1>
  <p>您好！本問卷為學術研究用途，由臺灣藝術大學圖文傳播藝術學系學生執行，指導老師為王俊人教授。</p>
  <p>本研究旨在了解消費者對不同包裝設計的感知與購買意願，預計填答時間：5–8 分鐘。</p>
  <p>本問卷採全程匿名，資料僅供學術統計使用。</p>
  <p class="note">⚠️ 建議使用電腦或平板填寫，以清楚辨識包裝圖片細節。</p>
  <br>
  <button class="btn" onclick="startSurvey()">開始填寫問卷</button>
  <p class="note" style="margin-top:16px;">感謝您撥冗參與！</p>
</div>

<script>
  const SURVEY_URLS = [
    "https://docs.google.com/forms/d/e/1FAIpQLSdvSxjFTiUZaES7cmtLG3b9Xq8Bh0ul3S3nzrRZyp15esbktw/viewform?usp=header",
    "https://docs.google.com/forms/d/e/1FAIpQLSdJzx9jSUA2BM5zZAfFFAZaDRE_-e6upVY6Q2_vDCqrgu_kKw/viewform?usp=header",
    "https://docs.google.com/forms/d/e/1FAIpQLScUxjuuEY0BM9bZzq1cB1SgRVzyWZkqTVcUj2yNz4bqCJEjAg/viewform?usp=header",
    "https://docs.google.com/forms/d/e/1FAIpQLSeLCZo34jJujOiSKOXCOS83TVGPazbiOmlf3LxlQbdJGZnczg/viewform?usp=header"
  ];

  function startSurvey() {
    const idx = Math.floor(Math.random() * SURVEY_URLS.length);
    window.location.href = SURVEY_URLS[idx];
  }
</script>
</body>
</html>
